<!--  Moves MOOD_PLAYLISTS here, iframe loads ONLY on click -->
<script>
    // Get mood from localStorage
    const mood = localStorage.getItem('selectedMood');
    console.log('Selected mood:', mood);
  
    // Get elements
    const spotifyButton = document.getElementById('spotify');
    const appleButton = document.getElementById('apple');
    const youtubeButton = document.getElementById('youtube');
    const soundcloudButton = document.getElementById('soundcloud');
    const playerContainer = document.getElementById('player-container');
  
    //  Mood to platform mapping
    const MOOD_PLAYLISTS = {
      happy: {
        spotify: "https://open.spotify.com/embed/playlist/37i9dQZF1DXdPec7aLTmlC",
        youtube: "PL4fGSI1pDJn5S09aId3dUGp40ygOk_v18",
        soundcloud: "https://soundcloud.com/search?q=happy%20music",
        description: "Feel-good vibes to brighten your day"
      },
      chill: {
        spotify: "https://open.spotify.com/embed/playlist/37i9dQZF1DX889U0CL85jj",
        youtube: "PLFgquLnL59alW3xmYiWRaoz0oM3H17Lth",
        soundcloud: "https://soundcloud.com/search?q=chill%20music",
        description: "Relax and unwind with these chill beats"
      },
      workout: {
        spotify: "https://open.spotify.com/embed/playlist/37i9dQZF1DX70RN3TfWWJh",
        youtube: "PLw-VjHDlEOgs658kAHR_LAaILBXb-s6Q5",
        soundcloud: "https://soundcloud.com/search?q=workout%20music",
        description: "Get pumped with high-energy tracks"
      },
      heartbreak: {
        spotify: "https://open.spotify.com/embed/playlist/37i9dQZF1DX7qK8ma5wgG1",
        youtube: "PLrEnWoR732-BHrPp_Pm8_VleD68f9s14-",
        soundcloud: "https://soundcloud.com/search?q=sad%20music",
        description: "Songs for when you're feeling down"
      }
    };
  
    // Helper: Fade out then replace content
    function replacePlayerContent(html) {
      if (!playerContainer) return;
      playerContainer.style.opacity = "0";
      setTimeout(() => {
        playerContainer.innerHTML = html;
        playerContainer.style.opacity = "1";
      }, 200);
    }
  
    // ✅ SPOTIFY PLAYER
    if (spotifyButton) {
      spotifyButton.addEventListener('click', () => {
        console.log('Spotify clicked');
        
        const playlistData = MOOD_PLAYLISTS[mood];
        
        if (playlistData && playlistData.spotify) {
          replacePlayerContent(`
            <div class="player-header" style="text-align:center; margin-bottom:20px; animation: fadeIn 0.5s ease;">
              <div class="platform-badge-large" style="display:inline-block; width:60px; height:60px; border-radius:50%; background:#1DB954; display:flex; align-items:center; justify-content:center; font-size:30px; margin:0 auto 16px; box-shadow: 0 8px 24px rgba(29, 185, 84, 0.4);">
                <img src="Images/spotify.svg" alt="Spotify" style="width:30px; height:auto;">
              </div>
              <h3 style="font-family: 'Syne', sans-serif; font-size:20px; color:var(--text-primary); margin:0;">
                ${playlistData.description}
              </h3>
            </div>
            <iframe 
              src="${playlistData.spotify}" 
              width="100%" 
              height="480" 
              frameborder="0" 
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
              loading="lazy" 
              style="border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.3);">
            </iframe>
            <p class="player-footer" style="text-align:center; margin-top:16px; color:var(--text-muted); font-size:14px; font-weight:600;">
               Playing on Spotify • ${mood ? mood.charAt(0).toUpperCase() + mood.slice(1) : 'Music'} mood
            </p>
          `);
        } else {
          replacePlayerContent(`
            <div style="text-align: center; padding: 60px 20px; color: var(--text-muted);">
              <p style="font-size: 18px;">No Spotify playlist available</p>
              <p style="font-size: 14px; margin-top: 8px;">Try a different mood!</p>
            </div>
          `);
        }
      });
    }
  
    // ✅ YOUTUBE PLAYER
    if (youtubeButton) {
      youtubeButton.addEventListener('click', () => {
        console.log('YouTube clicked');
        
        const playlistData = MOOD_PLAYLISTS[mood];
        
        if (playlistData && playlistData.youtube) {
          replacePlayerContent(`
            <div class="player-header" style="text-align:center; margin-bottom:20px; animation: fadeIn 0.5s ease;">
              <div class="platform-badge-large" style="display:inline-block; width:60px; height:60px; border-radius:50%; background:#FF0000; display:flex; align-items:center; justify-content:center; font-size:30px; margin:0 auto 16px; box-shadow: 0 8px 24px rgba(255, 0, 0, 0.4);">
                <img src="Images/YT.png" alt="YouTube" style="width:30px; height:auto;">
              </div>
              <h3 style="font-family: 'Syne', sans-serif; font-size:20px; color:var(--text-primary); margin:0;">
                ${playlistData.description}
              </h3>
            </div>
            <iframe 
              width="100%" 
              height="480" 
              src="https://www.youtube.com/embed/videoseries?list=${playlistData.youtube}" 
              frameborder="0" 
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
              allowfullscreen
              style="border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.3);">
            </iframe>
            <p class="player-footer" style="text-align:center; margin-top:16px; color:var(--text-muted); font-size:14px; font-weight:600;">
              ▶ Playing on YouTube • ${mood ? mood.charAt(0).toUpperCase() + mood.slice(1) : 'Music'} mood
            </p>
          `);
        } else {
          replacePlayerContent(`
            <div style="text-align: center; padding: 60px 20px; color: var(--text-muted);">
              <p style="font-size: 18px;">No YouTube playlist available</p>
              <p style="font-size: 14px; margin-top: 8px;">Try a different mood!</p>
            </div>
          `);
        }
      });
    }
  
    // ✅ SOUNDCLOUD LINK
    if (soundcloudButton) {
      soundcloudButton.addEventListener('click', () => {
        console.log('SoundCloud clicked');
        
        const playlistData = MOOD_PLAYLISTS[mood];
        
        if (playlistData && playlistData.soundcloud) {
          // SoundCloud doesn't support iframe embeds for search results
          // Open in new tab instead
          replacePlayerContent(`
            <div class="player-header" style="text-align:center; margin-bottom:20px; animation: fadeIn 0.5s ease;">
              <div class="platform-badge-large" style="display:inline-block; width:60px; height:60px; border-radius:50%; background:#FF5500; display:flex; align-items:center; justify-content:center; font-size:30px; margin:0 auto 16px; box-shadow: 0 8px 24px rgba(255, 85, 0, 0.4);">
               <img src="Images/soundcloud.png" alt="SoundCloud" style="width:30px; height:auto;">
              </div>
              <h3 style="font-family: 'Syne', sans-serif; font-size:20px; color:var(--text-primary); margin:0;">
                ${playlistData.description}
              </h3>
            </div>
            <div style="text-align:center; padding: 40px 20px;">
              <p style="margin-bottom: 20px; color: var(--text-muted);">
                Discover ${mood} music on SoundCloud
              </p>
              <a href="${playlistData.soundcloud}" target="_blank" rel="noopener noreferrer" 
                 style="display:inline-block; padding:16px 32px; background:#FF5500; color:white; text-decoration:none; border-radius:12px; font-weight:700; font-size:16px; box-shadow: 0 6px 20px rgba(255, 85, 0, 0.4); transition: transform 0.2s;"
                 onmouseover="this.style.transform='translateY(-2px)'" 
                 onmouseout="this.style.transform='translateY(0)'">
                Open SoundCloud
              </a>
            </div>
            <p class="player-footer" style="text-align:center; margin-top:16px; color:var(--text-muted); font-size:14px; font-weight:600;">
               Browse on SoundCloud • ${mood ? mood.charAt(0).toUpperCase() + mood.slice(1) : 'Music'} mood
            </p>
          `);
        } else {
          replacePlayerContent(`
            <div style="text-align: center; padding: 60px 20px; color: var(--text-muted);">
              <p style="font-size: 18px;">No SoundCloud link available</p>
              <p style="font-size: 14px; margin-top: 8px;">Try a different mood!</p>
            </div>
          `);
        }
      });
    }
  
    // ✅ APPLE MUSIC (Coming Soon)
    if (appleButton) {
      appleButton.addEventListener('click', () => {
        console.log('Apple Music clicked');
        
        replacePlayerContent(`
          <div class="coming-soon-card" style="background: var(--bg-secondary); border-radius: 20px; padding: 60px 40px; text-align: center; border: 2px solid rgba(255, 255, 255, 0.05); animation: fadeIn 0.5s ease;">
            <div class="platform-badge-large" style="display:inline-block; width:80px; height:80px; border-radius:50%; background:#FA243C; display:flex; align-items:center; justify-content:center; font-size:40px; margin:0 auto 20px; box-shadow: 0 8px 24px rgba(250, 36, 60, 0.4);">
              <img src="Images/apple-music.svg" alt="Apple Music" style="width:20px; height:auto;">
            </div>
            <p style="color: var(--text-muted); font-size: 16px; margin-bottom: 20px;">
              Apple Music integration coming soon!
            </p>
            <p style="color: var(--text-muted); font-size: 14px;">
              For now, enjoy Spotify, YouTube, and SoundCloud playlists curated for your mood. Stay tuned for updates!
            </p>
          </div>
        `);
      });
    }
  
    //  NO AUTO-PLAY - User must click a button!
    // Container stays empty until user clicks
</script>
  
<!-- Load Auth Modal Dynamically -->
<div id="auth-modal-container"></div>

<script type="module">
// DEFINE GLOBAL AUTH FUNCTIONS FIRST
import { signUp, signIn, signInWithGoogle, resetPassword } from './auth.js';

window.handleGoogleSignIn = async () => {
  const result = await signInWithGoogle();
  if (result.success) {
    closeAuthModal();
    showToast('Signed in with Google!');
  } else {
    alert('Google sign in failed: ' + result.error);
  }
};

window.switchAuthTab = (tab) => {
  document.querySelectorAll('.auth-form').forEach(f => f.style.display = 'none');
  const form = document.getElementById(`${tab}-form`);
  if (form) form.style.display = 'block';
  
  document.querySelectorAll('.auth-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  
  document.querySelectorAll('.auth-error, .auth-success').forEach(e => {
    if (e) e.style.display = 'none';
  });
};

function showToast(message) {
  const toast = document.getElementById('success-toast');
  if (toast) {
    const msgEl = document.getElementById('toast-message');
    if (msgEl) msgEl.textContent = message;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
  }
}
window.showToast = showToast;

fetch('auth-modal.html')
  .then(response => response.text())
  .then(html => {
    document.getElementById('auth-modal-container').innerHTML = html;
    setTimeout(initAuthHandlers, 100);
  })
  .catch(error => {
    console.error('❌ Failed to load auth modal:', error);
  });

function initAuthHandlers() {
  const signinForm = document.getElementById('signin-form-element');
  if (signinForm) {
    signinForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('signin-email').value;
      const password = document.getElementById('signin-password').value;
      const errorEl = document.getElementById('signin-error');
      const btn = e.target.querySelector('button[type="submit"]');
      
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorEl.style.display = 'none';
      
      const result = await signIn(email, password);
      
      if (result.success) {
        closeAuthModal();
        showToast('Welcome back!');
        e.target.reset();
      } else {
        errorEl.textContent = result.error;
        errorEl.style.display = 'block';
      }
      
      btn.disabled = false;
      btn.textContent = 'Sign In';
    });
  }

  const signupForm = document.getElementById('signup-form-element');
  if (signupForm) {
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const errorEl = document.getElementById('signup-error');
      const btn = e.target.querySelector('button[type="submit"]');
      
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      errorEl.style.display = 'none';
      
      const result = await signUp(email, password, name);
      
      if (result.success) {
        closeAuthModal();
        showToast('Account created! Welcome!');
        e.target.reset();
      } else {
        errorEl.textContent = result.error;
        errorEl.style.display = 'block';
      }
      
      btn.disabled = false;
      btn.textContent = 'Create Account';
    });
  }

  const resetForm = document.getElementById('reset-form-element');
  if (resetForm) {
    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('reset-email').value;
      const errorEl = document.getElementById('reset-error');
      const successEl = document.getElementById('reset-success');
      
      const result = await resetPassword(email);
      
      if (result.success) {
        successEl.textContent = 'Reset email sent! Check your inbox.';
        successEl.style.display = 'block';
        errorEl.style.display = 'none';
        e.target.reset();
      } else {
        errorEl.textContent = result.error;
        errorEl.style.display = 'block';
        successEl.style.display = 'none';
      }
    });
  }
}

window.toggleUserMenu = () => {
  const dropdown = document.getElementById('user-dropdown');
  if (dropdown) {
    const isVisible = dropdown.style.display === 'block';
    dropdown.style.display = isVisible ? 'none' : 'block';
  }
};
</script>

<script type="module">
import { auth } from './firebase-config/firebase-config.js';

window.goToMyProfile = function() {
  const user = auth.currentUser;
  
  if (user) {
    window.location.href = `profile.html?user=${user.uid}`;
  } else {
    if (typeof window.openAuthModal === 'function') {
      window.openAuthModal('signin');
    } else {
      alert('Please sign in first');
    }
  }
};
</script>
