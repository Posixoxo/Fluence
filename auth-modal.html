<!-- Auth Modal -->
<div id="auth-modal" class="auth-modal" style="display: none;">
  <div class="auth-modal-overlay" onclick="closeAuthModal()"></div>
  
  <div class="auth-modal-content">
    <!-- Close Button -->
    <button class="auth-close" onclick="closeAuthModal()">✕</button>
    
    
    <!-- Sign In Form -->
    <div id="signin-form" class="auth-form">
      <h2>Welcome Back!</h2>
      <p>Please enter your email & password to signin.</p>
      <form id="signin-form-element">

        <div class="input-group">
          <img src="Images/mail-01.png" alt="mail" class="input-icon">
          <input type="email" id="signin-email" placeholder="Email" required>
        </div>

        <div class="input-group">
          <img src="Images/Label.png" alt="label" class="input-icon">
          <input type="password" id="signin-password" placeholder="Password" required>
        </div>

        <button type="submit" class="auth-btn">Sign In</button>
      </form>
      
      <button class="google-btn" onclick="handleGoogleSignIn()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
        Continue with Google
      </button>
      
      <p class="auth-link">
        <a href="#" onclick="switchAuthTab('reset'); return false;">Forgot password?</a>
      </p>
      
      <div id="signin-error" class="auth-error" style="display: none;"></div>

    <div class="auth-tabs">
      <button class="auth-tab" data-tab="signup" onclick="switchAuthTab('signup')">Don't have an account? <p>Sign up</p></button>
    </div>

    </div>
    
    <!-- Sign Up Form -->
    <div id="signup-form" class="auth-form" style="display: none;">
      <h2>Create Account</h2>
      <form id="signup-form-element">
        <input type="text" id="signup-name" placeholder="Display Name" required>

          <div class="input-group">
            <img src="Images/mail-01.png" alt="mail" class="input-icon">
            <input type="email" id="signup-email" placeholder="Email" required>
          </div>

          <div class="input-group">
            <img src="Images/Label.png" alt="label" class="input-icon">
            <input type="password" id="signup-password" placeholder="Password (min 6 chars)" required>
          </div>

        <button type="submit" class="auth-btn">Create Account</button>
      </form>
      
      <button class="google-btn" onclick="handleGoogleSignIn()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
        Continue with Google
      </button>
      
      <div id="signup-error" class="auth-error" style="display: none;"></div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="signin" onclick="switchAuthTab('signin')">Already an account? <p>Login</p></button>
    </div>

    </div>
    
    <!-- Password Reset Form -->
    <div id="reset-form" class="auth-form" style="display: none;">
      <h2>Reset Password</h2>
      <form id="reset-form-element">
        <input type="email" id="reset-email" placeholder="Email" required>
        <button type="submit" class="auth-btn">Send Reset Link</button>
      </form>
      
      <p class="auth-link">
        <a href="#" onclick="switchAuthTab('signin'); return false;">← Back to Sign In</a>
      </p>
      
      <div id="reset-error" class="auth-error" style="display: none;"></div>
      <div id="reset-success" class="auth-success" style="display: none;"></div>
    </div>
  </div>
</div>


<!-- Success Toast -->
<div id="success-toast" style="display: none; position: fixed; bottom: 20px; right: 20px; background: #1DB954; color: white; padding: 15px 20px; border-radius: 10px; z-index: 100000;">
  <span id="toast-message">Success!</span>
</div>

<script type="module">

import { signUp, signIn, signInWithGoogle, resetPassword } from './auth.js';

// ✅ DEFINE FUNCTIONS FIRST (before DOM loads)
window.handleGoogleSignIn = async () => {
  const result = await signInWithGoogle();
  if (result.success) {
    closeAuthModal();
    showToast('Signed in with Google!');
  }
};

window.switchAuthTab = (tab) => {
  document.querySelectorAll('.auth-form').forEach(f => f.style.display = 'none');
  const form = document.getElementById(`${tab}-form`);
  if (form) form.style.display = 'block';
  
  document.querySelectorAll('.auth-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  
  // Clear errors
  document.querySelectorAll('.auth-error, .auth-success').forEach(e => {
    if (e) e.style.display = 'none';
  });
};

function showToast(message) {
  const toast = document.getElementById('success-toast');
  if (toast) {
    const msgEl = document.getElementById('toast-message');
    if (msgEl) msgEl.textContent = message;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
  }
}

// ✅ THEN ATTACH FORM HANDLERS
function initAuthHandlers() {
  // Sign In Handler
  const signinForm = document.getElementById('signin-form-element');
  if (signinForm) {
    signinForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('signin-email').value;
      const password = document.getElementById('signin-password').value;
      const errorEl = document.getElementById('signin-error');
      const btn = e.target.querySelector('button[type="submit"]');
      
      if (!btn) return;
      
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorEl.style.display = 'none';
      
      const result = await signIn(email, password);
      
      if (result.success) {
        closeAuthModal();
        showToast('Welcome back!');
        e.target.reset();
      } else {
        errorEl.textContent = result.error;
        errorEl.style.display = 'block';
      }
      
      btn.disabled = false;
      btn.textContent = 'Sign In';
    });
  }

  // Sign Up Handler
  const signupForm = document.getElementById('signup-form-element');
  if (signupForm) {
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const errorEl = document.getElementById('signup-error');
      const btn = e.target.querySelector('button[type="submit"]');
      
      if (!btn) return;
      
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      errorEl.style.display = 'none';
      
      const result = await signUp(email, password, name);
      
      if (result.success) {
        closeAuthModal();
        showToast('Account created! Welcome!');
        e.target.reset();
      } else {
        errorEl.textContent = result.error;
        errorEl.style.display = 'block';
      }
      
      btn.disabled = false;
      btn.textContent = 'Create Account';
    });
  }

  // Password Reset Handler
  const resetForm = document.getElementById('reset-form-element');
  if (resetForm) {
    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('reset-email').value;
      const errorEl = document.getElementById('reset-error');
      const successEl = document.getElementById('reset-success');
      
      const result = await resetPassword(email);
      
      if (result.success) {
        successEl.textContent = 'Reset email sent! Check your inbox.';
        successEl.style.display = 'block';
        errorEl.style.display = 'none';
        e.target.reset();
      } else {
        errorEl.textContent = result.error;
        errorEl.style.display = 'block';
        successEl.style.display = 'none';
      }
    });
  }
}

// ✅ INITIALIZE WHEN MODAL IS LOADED
setTimeout(initAuthHandlers, 200);
</script>
