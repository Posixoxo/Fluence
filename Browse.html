<!-- Load Auth Modal Dynamically -->
<div id="auth-modal-container"></div>

<script type="module">
// DEFINE GLOBAL AUTH FUNCTIONS FIRST (before modal loads)
import { signUp, signIn, signInWithGoogle, resetPassword } from './auth.js';

// Google Sign In
window.handleGoogleSignIn = async () => {
  console.log('🔍 Google sign in clicked');
  const result = await signInWithGoogle();
  if (result.success) {
    closeAuthModal();
    showToast('Signed in with Google!');
  } else {
    console.error('Google sign in failed:', result.error);
    alert('Google sign in failed: ' + result.error);
  }
};

// Switch Auth Tabs
window.switchAuthTab = (tab) => {
  console.log('Switching to tab:', tab);
  document.querySelectorAll('.auth-form').forEach(f => f.style.display = 'none');
  const form = document.getElementById(`${tab}-form`);
  if (form) form.style.display = 'block';
  
  document.querySelectorAll('.auth-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  
  // Clear errors
  document.querySelectorAll('.auth-error, .auth-success').forEach(e => {
    if (e) e.style.display = 'none';
  });
};

// Show Toast
function showToast(message) {
  const toast = document.getElementById('success-toast');
  if (toast) {
    const msgEl = document.getElementById('toast-message');
    if (msgEl) msgEl.textContent = message;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
  }
}
window.showToast = showToast;

// ✅ NOW LOAD THE MODAL
fetch('auth-modal.html')
  .then(response => response.text())
  .then(html => {
    document.getElementById('auth-modal-container').innerHTML = html;
    console.log('✅ Auth modal loaded');
    
    // ✅ ATTACH FORM HANDLERS AFTER MODAL LOADS
    setTimeout(initAuthHandlers, 100);
  })
  .catch(error => {
    console.error('❌ Failed to load auth modal:', error);
  });

// Form Handlers
function initAuthHandlers() {
  console.log('🔧 Initializing auth handlers...');
  
  // Sign In Handler
  const signinForm = document.getElementById('signin-form-element');
  if (signinForm) {
    signinForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('signin-email').value;
      const password = document.getElementById('signin-password').value;
      const errorEl = document.getElementById('signin-error');
      const btn = e.target.querySelector('button[type="submit"]');
      
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorEl.style.display = 'none';
      
      const result = await signIn(email, password);
      
      if (result.success) {
        closeAuthModal();
        showToast('Welcome back!');
        e.target.reset();
      } else {
        errorEl.textContent = result.error;
        errorEl.style.display = 'block';
      }
      
      btn.disabled = false;
      btn.textContent = 'Sign In';
    });
    console.log('✅ Sign in handler attached');
  }

  // Sign Up Handler
  const signupForm = document.getElementById('signup-form-element');
  if (signupForm) {
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const errorEl = document.getElementById('signup-error');
      const btn = e.target.querySelector('button[type="submit"]');
      
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      errorEl.style.display = 'none';
      
      const result = await signUp(email, password, name);
      
      if (result.success) {
        closeAuthModal();
        showToast('Account created! Welcome!');
        e.target.reset();
      } else {
        errorEl.textContent = result.error;
        errorEl.style.display = 'block';
      }
      
      btn.disabled = false;
      btn.textContent = 'Create Account';
    });
    console.log('✅ Sign up handler attached');
  }

  // Password Reset Handler
  const resetForm = document.getElementById('reset-form-element');
  if (resetForm) {
    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('reset-email').value;
      const errorEl = document.getElementById('reset-error');
      const successEl = document.getElementById('reset-success');
      
      const result = await resetPassword(email);
      
      if (result.success) {
        successEl.textContent = 'Reset email sent! Check your inbox.';
        successEl.style.display = 'block';
        errorEl.style.display = 'none';
        e.target.reset();
      } else {
        errorEl.textContent = result.error;
        errorEl.style.display = 'block';
        successEl.style.display = 'none';
      }
    });
    console.log('✅ Password reset handler attached');
  }
}

// Toggle user dropdown (works inside mobile nav)
window.toggleUserMenu = () => {
  const dropdown = document.getElementById('user-dropdown');
  if (dropdown) {
    const isVisible = dropdown.style.display === 'block';
    dropdown.style.display = isVisible ? 'none' : 'block';
    console.log('User menu toggled:', !isVisible);
  }
};
</script>

<script type="module">
import { auth } from './firebase-config/firebase-config.js';

// ✅ Define goToMyProfile function globally
window.goToMyProfile = function() {
  console.log('🔍 goToMyProfile called');
  
  // Get current user from modular Firebase
  const user = auth.currentUser;
  
  if (user) {
    console.log('✅ User found:', user.uid);
    window.location.href = `profile.html?user=${user.uid}`;
  } else {
    console.error('❌ No user logged in');
    
    // Try to open auth modal if available
    if (typeof window.openAuthModal === 'function') {
      window.openAuthModal('signin');
    } else {
      alert('Please sign in first');
    }
  }
};

console.log('✅ goToMyProfile function defined and ready');
</script>


<script>
   // desktop profile-image with dropdown fix

  function toggleProfileDropdown(event) {
  // Prevent the click from immediately bubbling up to the window
  event.stopPropagation(); 
  
  const dropdown = document.getElementById('profile-dropdown-menu');
  
  // Toggle visibility
  if (dropdown.style.display === 'none' || dropdown.style.display === '') {
    dropdown.style.display = 'block';
  } else {
    dropdown.style.display = 'none';
  }
}

// Close the dropdown if the user clicks anywhere outside of it
window.addEventListener('click', function(event) {
  const dropdown = document.getElementById('profile-dropdown-menu');
  const profileSection = document.getElementById('user-profile-section');
  
  if (dropdown && dropdown.style.display === 'block') {
    // If the click happened outside the user-profile-section, hide the menu
    if (!profileSection.contains(event.target)) {
      dropdown.style.display = 'none';
    }
  }
});
</script>
